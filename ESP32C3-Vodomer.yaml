esphome:
  name: voda-vodovod
  friendly_name: voda-vodovod

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "GeneratedEncryption"  # Vygenerovaný encryption key - nechte výchozí

ota:
  - platform: esphome
    password: "OTAPassword"     # Heslo pro Over the Air aktualizace - nechte výchozí

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
    
sensor:
  - platform: pulse_counter
    pin: GPIO4  # Číslo PIN na desce - změňte podle fyzického připojení
    name: "Vodovod Water Pulse Count"
    id: vodovod_water_pulse
    update_interval: 5s
    unit_of_measurement: "pulses"
    accuracy_decimals: 0
